<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMC para WhatsApp</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 30px;
    background-color: #f5f5f5;
}

input{
    padding: 10px;
    margin: 5px;
    width: 200px;
}

button{
    padding: 10px 20px;
    background-color: #25D366;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

button:hover{
    opacity: 0.9;
}

#resultado{
    margin-top: 15px;
    font-size: 18px;
}
</style>

</head>
<body>

<h2>Calculadora de IMC</h2>

<input type="number" id="peso" placeholder="Peso (kg)" step="0.1"><br>

<input type="number" id="altura" placeholder="Altura (m)" step="0.01"><br><br>

<button onclick="calcularEEnviar()">Calcular e Enviar</button>

<p id="resultado"></p>

<script>

function calcularEEnviar(){

    let peso = parseFloat(document.getElementById("peso").value);
    let altura = parseFloat(document.getElementById("altura").value);

    if(!peso || !altura){
        alert("Preencha peso e altura.");
        return;
    }

    let imc = peso / (altura * altura);
    let classificacao = "";

    if(imc < 18.5){
        classificacao = "Abaixo do peso";
    }
    else if(imc < 25){
        classificacao = "Peso ideal";
    }
    else if(imc < 30){
        classificacao = "Sobrepeso";
    }
    else{
        classificacao = "Obesidade";
    }

    document.getElementById("resultado").innerHTML =
        "Seu IMC é <strong>" + imc.toFixed(2) +
        "</strong> - " + classificacao;

    let mensagem =
        "Meu IMC é " + imc.toFixed(2) +
        ". Classificação: " + classificacao + ".";

    // Troque pelo seu número
    let numero = "5522999999999";

    let url =
        "https://wa.me/" + numero +
        "?text=" + encodeURIComponent(mensagem);

    window.open(url, "_blank");
}

</script>

</body>
</html>
