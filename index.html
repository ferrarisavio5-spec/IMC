<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <style>
        /* Estilização Básica (CSS) */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #25d366; /* Cor do WhatsApp */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #128c7e;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e7f3ef;
            border-left: 5px solid #25d366;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculadora de IMC</h1>
    
    <div class="form-group">
        <label for="phone">WhatsApp (com DDD, apenas números):</label>
        <input type="tel" id="phone" placeholder="Ex: 21999999999" required>
    </div>

    <div class="form-group">
        <label for="weight">Peso (kg):</label>
        <input type="number" id="weight" step="0.1" placeholder="Ex: 75.5" required>
    </div>

    <div class="form-group">
        <label for="height">Altura (m):</label>
        <input type="number" id="height" step="0.01" placeholder="Ex: 1.75" required>
    </div>

    <button onclick="calcularEEnviar()">Calcular e Enviar via WhatsApp</button>

    <div id="resultBox" class="result"></div>
</div>

<script>
    // Lógica do Sistema (JavaScript)
    function calcularEEnviar() {
        const phone = document.getElementById('phone').value.trim();
        const weight = parseFloat(document.getElementById('weight').value);
        const height = parseFloat(document.getElementById('height').value);

        // Validação simples dos campos
        if (!phone || isNaN(weight) || isNaN(height) || height <= 0 || weight <= 0) {
            alert("Por favor, preencha todos os campos corretamente.");
            return;
        }

        // Cálculo do IMC: peso / (altura * altura)
        const imc = (weight / (height * height)).toFixed(2);
        let classificacao = "";

        // Tabela de Classificação do IMC
        if (imc < 18.5) {
            classificacao = "Abaixo do peso";
        } else if (imc >= 18.5 && imc < 24.9) {
            classificacao = "Peso normal";
        } else if (imc >= 25 && imc < 29.9) {
            classificacao = "Sobrepeso";
        } else if (imc >= 30 && imc < 34.9) {
            classificacao = "Obesidade Grau I";
        } else if (imc >= 35 && imc < 39.9) {
            classificacao = "Obesidade Grau II";
        } else {
            classificacao = "Obesidade Grau III (Mórbida)";
        }

        // Exibe o resultado na tela do site
        const resultBox = document.getElementById('resultBox');
        resultBox.style.display = "block";
        resultBox.innerHTML = `<strong>Seu IMC:</strong> ${imc}<br><strong>Classificação:</strong> ${classificacao}<br><br><em>Redirecionando para o WhatsApp...</em>`;

        // Monta a mensagem para o WhatsApp
        const mensagem = `Olá! Meu resultado do IMC:\n\n- Peso: ${weight} kg\n- Altura: ${height} m\n- *IMC:* ${imc}\n- *Classificação:* ${classificacao}`;
        
        // Codifica o texto para formato de URL
        const mensagemFormatada = encodeURIComponent(mensagem);

        // API do WhatsApp para abrir a conversa automaticamente
        const urlWhatsApp = `https://api.whatsapp.com/send?phone=55${phone}&text=${mensagemFormatada}`;

        // Redireciona o usuário após 2 segundos
        setTimeout(() => {
            window.open(urlWhatsApp, '_blank');
        }, 2000);
    }
</script>

</body>
</html>
